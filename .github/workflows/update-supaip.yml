name: Update SUP AIP data

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-supaip-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/supaip/requirements.txt

      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check -r tools/supaip/requirements.txt

      - name: Run parser unit tests
        run: python -m unittest tools.supaip.test_update_supaip

      - name: Build SUP AIP GeoJSON
        run: python tools/supaip/update_supaip.py --output-dir public/data

      - name: Validate generated files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          geo = json.loads(Path('public/data/supaip-current.geojson').read_text(encoding='utf-8'))
          status = json.loads(Path('public/data/supaip-status.json').read_text(encoding='utf-8'))
          assert geo['type'] == 'FeatureCollection'
          assert len(geo['features']) == status['featureCount']
          assert status['featureCount'] > 0
          print(f"Validated {status['featureCount']} zones from {status['mappedPublicationCount']} publications")
          PY

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/supaip-current.geojson public/data/supaip-status.json public/data/supaip-unmapped.json; then
            echo "No SUP AIP change"
            exit 0
          fi
          git config user.name "CAP CLAIR SUP AIP Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/supaip-current.geojson public/data/supaip-status.json public/data/supaip-unmapped.json
          git commit -m "data: actualisation automatique SUP AIP"
          git push
