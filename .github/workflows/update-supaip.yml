name: Update SUP AIP data

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-supaip-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/supaip/requirements.txt

      - name: Install parser dependencies
        run: python -m pip install --disable-pip-version-check -r tools/supaip/requirements.txt

      - name: Run parser unit tests
        run: python -m unittest tools.supaip.test_update_supaip

      - name: Build SUP AIP GeoJSON
        run: python tools/supaip/update_supaip.py --output-dir public/data

      - name: Validate generated files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          geo = json.loads(Path('public/data/supaip-current.geojson').read_text(encoding='utf-8'))
          status = json.loads(Path('public/data/supaip-status.json').read_text(encoding='utf-8'))
          manifest = json.loads(Path('public/data/supaip-manifest.json').read_text(encoding='utf-8'))

          assert geo['type'] == 'FeatureCollection'
          assert status['schemaVersion'] >= 2
          assert len(geo['features']) == status['featureCount']
          assert status['featureCount'] > 0
          assert status['processedPublicationCount'] == status['listingPublicationCount']
          assert status['downloadedPublicationCount'] + status['reusedPublicationCount'] == status['listingPublicationCount']
          assert status['zonalPublicationCount'] == status['mappedPublicationCount'] + status['completeUnmappedPublicationCount']
          assert status['mappedPublicationCount'] == (
              status['fullyMappedPublicationCount']
              + status.get('conservativePublicationCount', 0)
              + status.get('fallbackPublicationCount', 0)
              + status['partialPublicationCount']
          )
          assert status.get('conservativePublicationCount', 0) == status.get('conservativelyMappedPublicationCount', 0)
          assert status.get('fallbackPublicationCount', 0) == status.get('fallbackMappedPublicationCount', 0)
          assert status.get('unresolvedRegressionCount', 0) == 0
          assert len(manifest.get('publications', [])) == status['listingPublicationCount']

          ids = [feature.get('id') or feature.get('properties', {}).get('id') for feature in geo['features']]
          assert all(ids)
          assert len(ids) == len(set(ids))

          missing_vertical = 0
          for feature in geo['features']:
              props = feature.get('properties', {})
              extracted = props.get('verticalLimitsExtracted', False)
              if extracted:
                  assert props.get('lowerLimit') and props.get('upperLimit')
              else:
                  missing_vertical += 1
                  assert props.get('verticalLimitNotice')
          assert missing_vertical == status['missingVerticalFeatureCount']
          assert status['verticalCompleteFeatureCount'] + status['missingVerticalFeatureCount'] == status['featureCount']

          print(
              f"Validated {status['processedPublicationCount']}/{status['listingPublicationCount']} PDF, "
              f"{status['featureCount']} geometries, {status.get('regressionRecoveredFeatureCount', 0)} recovered regression geometries "
              f"and {status['missingVerticalFeatureCount']} missing vertical limits"
          )
          PY

      - name: Publish run summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          status = json.loads(Path('public/data/supaip-status.json').read_text(encoding='utf-8'))
          unmapped = json.loads(Path('public/data/supaip-unmapped.json').read_text(encoding='utf-8')).get('publications', [])
          summary = Path(os.environ['GITHUB_STEP_SUMMARY'])
          lines = [
              '# CAP CLAIR - bilan SUP AIP Parser V3.2 anti-régression',
              '',
              f"- Publications SIA listées : {status['listingPublicationCount']}",
              f"- PDF contrôlés : {status['processedPublicationCount']}",
              f"- PDF téléchargés : {status['downloadedPublicationCount']}",
              f"- Publications réutilisées : {status['reusedPublicationCount']}",
              f"- Publications non spatiales : {status['nonSpatialPublicationCount']}",
              f"- Publications spatiales : {status['zonalPublicationCount']}",
              f"- Publications entièrement cartographiées : {status['fullyMappedPublicationCount']}",
              f"- Publications affichées avec prudence : {status.get('conservativePublicationCount', 0)}",
              f"- Publications complètes avec repli : {status.get('fallbackPublicationCount', 0)}",
              f"- Publications réellement partielles : {status['partialPublicationCount']}",
              f"- Publications non cartographiées : {status['completeUnmappedPublicationCount']}",
              f"- Géométries nommées attendues : {status['expectedNamedGeometryCount']}",
              f"- Géométries produites : {status['featureCount']}",
              f"- Géométries avec verticales : {status['verticalCompleteFeatureCount']}",
              f"- Géométries sans verticales : {status['missingVerticalFeatureCount']}",
              f"- Replis de sécurité : {status.get('safetyFallbackPublicationCount', 0)} publication(s) / {status.get('safetyFallbackFeatureCount', 0)} zone(s)",
              f"- Régressions compensées : {status.get('regressionRecoveredPublicationCount', 0)} publication(s) / {status.get('regressionRecoveredFeatureCount', 0)} zone(s)",
              f"- Régressions non résolues : {status.get('unresolvedRegressionCount', 0)}",
              f"- Références permanentes ignorées : {status.get('ignoredReferenceObjectCount', 0)}",
              '',
              '## Causes des publications incomplètes',
              '',
          ]
          cause_counts = status.get('incompleteCausePublicationCounts', {})
          cause_labels = status.get('incompleteCauseLabels', {})
          for code, count in cause_counts.items():
              if count:
                  lines.append(f"- {cause_labels.get(code, code)} : {count} publication(s)")
          lines.append('')
          if unmapped:
              lines.extend(['## Publications à contrôler', ''])
              for item in unmapped[:60]:
                  item_status = item.get('status')
                  state = (
                      'affiché avec prudence' if item_status == 'conservative'
                      else 'complet avec repli' if item_status == 'fallback'
                      else 'partiel' if item_status == 'partial' or item.get('partial')
                      else 'non cartographié'
                  )
                  mapped = item.get('mappedGeometryCount', 0)
                  expected = item.get('expectedNamedGeometryCount', 0)
                  vertical = item.get('missingVerticalCount', 0)
                  lines.append(
                      f"- {item.get('supAip')} - {state} - {mapped}/{expected} géométries - "
                      f"{vertical} verticale(s) manquante(s) - {item.get('title')}"
                  )
                  reason = item.get('reason')
                  if reason:
                      lines.append(f"  - Diagnostic : {reason}")
          regression_details = status.get('regressionRecoveredDetails', [])
          if regression_details:
              lines.extend(['', '## Régressions compensées avant publication', ''])
              for item in regression_details:
                  names = ', '.join(item.get('recoveredFeatureNames', [])) or 'noms indisponibles'
                  lines.append(
                      f"- {item.get('supAip')} - candidat {item.get('candidateFeatureCount', 0)} / base précédente {item.get('previousFeatureCount', 0)} - "
                      f"{item.get('recoveredFeatureCount', 0)} zone(s) restaurée(s) : {names}"
                  )
          fallback_details = status.get('safetyFallbackDetails', [])
          if fallback_details:
              lines.extend(['', '## Replis de sécurité détaillés', ''])
              for item in fallback_details:
                  names = ', '.join(item.get('featureNames', [])) or 'noms indisponibles'
                  lines.append(f"- {item.get('supAip')} - {item.get('featureCount', 0)} zone(s) : {names}")
          summary.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/supaip-current.geojson public/data/supaip-status.json public/data/supaip-unmapped.json public/data/supaip-manifest.json; then
            echo "No SUP AIP change"
            exit 0
          fi
          git config user.name "CAP CLAIR SUP AIP Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/supaip-current.geojson public/data/supaip-status.json public/data/supaip-unmapped.json public/data/supaip-manifest.json
          git commit -m "data: actualisation automatique SUP AIP Parser V3.2"
          git push
