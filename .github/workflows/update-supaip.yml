name: Update SUP AIP data

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-supaip-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: tools/supaip/requirements.txt

      - name: Install SUP AIP dependencies
        run: python -m pip install --disable-pip-version-check -r tools/supaip/requirements.txt

      - name: Run parser and pipeline tests
        run: |
          python -m unittest \
            tools.supaip.test_update_supaip \
            tools.supaip.test_supaip_pipeline

      - name: Build and publish SUP AIP transactionally
        run: |
          python tools/supaip/publish_supaip.py \
            --output-dir public/data \
            --overrides tools/supaip/overrides.geojson

      - name: Validate complete published release
        run: python tools/supaip/validate_supaip_release.py --output-dir public/data

      - name: Validate compatibility and counters
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data_dir = Path('public/data')
          latest = json.loads((data_dir / 'supaip/latest.json').read_text(encoding='utf-8'))
          status = json.loads((data_dir / 'supaip-status.json').read_text(encoding='utf-8'))
          revision = latest['datasetRevision']
          revision_dir = data_dir / 'supaip' / 'revisions' / revision
          geo = json.loads((revision_dir / 'data.geojson').read_text(encoding='utf-8'))
          manifest = json.loads((revision_dir / 'manifest.json').read_text(encoding='utf-8'))

          assert latest['schemaVersion'] == 2
          assert status['schemaVersion'] == 2
          assert status['datasetRevision'] == revision
          assert status['datasetGeneratedAt'] == latest['datasetGeneratedAt']
          assert status['lastSuccessfulCheckAt'] == latest['lastSuccessfulCheckAt']
          assert status['generatedAt'] == status['lastSuccessfulCheckAt']
          assert len(geo['features']) == manifest['featureCount'] == status['featureCount']
          assert manifest['publicationCount'] == status['listingPublicationCount']
          assert manifest['featuresWithVerticalLimits'] == status['verticalCompleteFeatureCount']
          assert manifest['featuresWithoutVerticalLimits'] == status['missingVerticalFeatureCount']
          assert status['processedPublicationCount'] == status['listingPublicationCount']
          assert status['downloadedPublicationCount'] + status['reusedPublicationCount'] == status['listingPublicationCount']
          assert status.get('unresolvedRegressionCount', 0) == 0

          print(
              f"Validated revision {revision[:12]}: "
              f"{manifest['publicationCount']} publications, "
              f"{manifest['featureCount']} geometries, "
              f"check {latest['lastSuccessfulCheckAt']}"
          )
          PY

      - name: Publish run summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          data_dir = Path('public/data')
          latest = json.loads((data_dir / 'supaip/latest.json').read_text(encoding='utf-8'))
          status = json.loads((data_dir / 'supaip-status.json').read_text(encoding='utf-8'))
          revision_dir = data_dir / 'supaip' / 'revisions' / latest['datasetRevision']
          manifest = json.loads((revision_dir / 'manifest.json').read_text(encoding='utf-8'))
          unmapped = json.loads((revision_dir / 'unmapped.json').read_text(encoding='utf-8')).get('publications', [])
          summary = Path(os.environ['GITHUB_STEP_SUMMARY'])

          lines = [
              '# CAP CLAIR - SUP AIP DATA PIPELINE',
              '',
              f"- Révision : `{latest['datasetRevision']}`",
              f"- Base générée : {latest['datasetGeneratedAt']}",
              f"- Dernier contrôle SIA réussi : {latest['lastSuccessfulCheckAt']}",
              f"- Mode du contrôle : {latest.get('checkMode', 'inconnu')}",
              f"- Publications SIA : {manifest['publicationCount']}",
              f"- Publications avec géométrie : {manifest['publicationsWithGeometry']}",
              f"- Géométries : {manifest['featureCount']}",
              f"- Géométries avec verticales : {manifest['featuresWithVerticalLimits']}",
              f"- Géométries sans verticales : {manifest['featuresWithoutVerticalLimits']}",
              f"- PDF téléchargés : {status['downloadedPublicationCount']}",
              f"- Publications réutilisées : {status['reusedPublicationCount']}",
              f"- Régressions non résolues : {status.get('unresolvedRegressionCount', 0)}",
              f"- Exceptions géométriques historiques inchangées : {len(manifest.get('legacyInvalidGeometryExceptions', []))}",
              '',
              '## Publications à contrôler',
              '',
          ]
          if unmapped:
              for item in unmapped[:60]:
                  state = item.get('status', 'à contrôler')
                  lines.append(
                      f"- {item.get('supAip')} - {state} - "
                      f"{item.get('mappedGeometryCount', 0)}/{item.get('expectedNamedGeometryCount', 0)} géométries - "
                      f"{item.get('missingVerticalCount', 0)} verticale(s) manquante(s)"
                  )
          else:
              lines.append('- Aucune publication à contrôler.')

          summary.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit successful check and release data
        run: |
          if git diff --quiet -- \
            public/data/supaip-current.geojson \
            public/data/supaip-status.json \
            public/data/supaip-manifest.json \
            public/data/supaip-unmapped.json \
            public/data/supaip; then
            echo "No SUP AIP publication diff"
            exit 0
          fi

          git config user.name "CAP CLAIR SUP AIP Bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            public/data/supaip-current.geojson \
            public/data/supaip-status.json \
            public/data/supaip-manifest.json \
            public/data/supaip-unmapped.json \
            public/data/supaip
          git commit -m "data: contrôle automatique SUP AIP"
          git push
