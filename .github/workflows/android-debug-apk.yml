name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - 'dev15-*'

permissions:
  contents: read

jobs:
  build-android-debug-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    env:
      VITE_CAPCLAIR_API_BASE_URL: ${{ vars.CAPCLAIR_API_BASE_URL || 'https://capclair.pages.dev' }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Show Node and npm versions
        run: |
          node -v
          npm -v

      - name: Install npm dependencies
        run: npm ci --no-audit --no-fund

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Show Java version
        run: java -version

      - name: Decode Android signing key
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/capclair-dev.keystore
          ls -lh android/app/capclair-dev.keystore

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cap-clair-dev15-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
